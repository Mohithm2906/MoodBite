<!DOCTYPE html>
<html>

<head>
    <title>MoodBite</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <h2>MoodBite</h2>
        <div>
            <a href="orders.html">View Orders</a>
            <a href="login.html">Logout</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Order food based on your mood</h1>
        <p>Mood-based food ordering with Veg, Non-Veg, Idli, Dosa and smart search.</p>

        <div class="mood-buttons">
            <button onclick="showFood('Happy')">😊 Happy</button>
            <button onclick="showFood('Tired')">😴 Tired</button>
            <button onclick="showFood('Spicy')">🔥 Spicy</button>
            <button onclick="showFood('Healthy')">🥗 Healthy</button>
            <button onclick="showFood('SouthIndian')">🍽 Idli & Dosa</button>
            <button onclick="showFood('NonVeg')">🍗 Non-Veg</button>
        </div>
    </section>

    <section class="controls">
        <input type="text" id="searchInput" placeholder="Search food..." onkeyup="filterFoods()">

        <select id="typeFilter" onchange="filterFoods()">
            <option value="All">All</option>
            <option value="Veg">Veg</option>
            <option value="Non-Veg">Non-Veg</option>
            <option value="Healthy">Healthy</option>
            <option value="Drink">Drink</option>
        </select>
    </section>

    <section>
        <h2 class="title">Recommended Menu</h2>
        <div id="menu" class="menu"></div>
    </section>

    <section class="cart">
        <h2>Your Cart</h2>
        <ul id="cartList"></ul>
        <h3>Total: ₹<span id="total">0</span></h3>
        <button onclick="placeOrder()">Place Order</button>
    </section>

    <script src="script.js"></script>
</body>

</html>
